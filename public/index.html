<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>lightsout — paint efficiency over document size</title>
<meta name="description" content="Does your site paint as fast as the network allows? lightsout computes the earliest paint physically possible — then measures how long JavaScript actually makes you wait.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#0a0c0f;color:#e7e9ec;font-family:'Space Grotesk',system-ui,sans-serif}
  ::selection{background:rgba(80,220,120,0.25)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#23282f;border-radius:6px}
  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
  @keyframes pulseGlow{0%,100%{opacity:1}50%{opacity:.55}}
  @keyframes spin{to{transform:rotate(360deg)}}
  input[type=range]{-webkit-appearance:none;height:4px;background:#23282f;border-radius:3px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#50dc78;cursor:pointer;box-shadow:0 0 8px rgba(80,220,120,.6)}
  button{font-family:inherit}
  a{color:inherit}

  #boot{min-height:100vh;display:flex;align-items:center;justify-content:center;gap:14px}
  #boot span{width:18px;height:18px;border-radius:50%;background:#15181d;border:1px solid #23282f;animation:pulseGlow 1.1s ease-in-out infinite}
  #boot span:nth-child(2){animation-delay:.12s}#boot span:nth-child(3){animation-delay:.24s}
  #boot span:nth-child(4){animation-delay:.36s}#boot span:nth-child(5){animation-delay:.48s}
</style>

<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"></noscript>
</head>
<body>
<div id="app"><div id="boot"><span></span><span></span><span></span><span></span><span></span></div></div>
<script src="./app.js" defer></script>
</body>
</html>
